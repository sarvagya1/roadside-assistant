spring:
  application:
    name: ticket-service
  main:
    lazy-initialization: ${SPRING_LAZY_INIT:false}
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ticketdb}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
  cloud:
    function:
      definition: createTicket;getTicketById

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ticket-service

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 1000
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      default:
        timeoutDuration: 5s

# AWS Configuration
aws:
  paramstore:
    prefix: /roadside/ticket-service
  region: ${AWS_REGION:us-east-1}
